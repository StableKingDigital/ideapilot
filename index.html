<!DOCTYPE html>
<html>
<head>
<title>IdeaPilot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:260px;
background:#020617;
padding:20px;
}

#brand h2{margin:0}
#brand p{font-size:12px;color:#94a3b8}

#newChat{
background:#22c55e;
border:none;
padding:12px;
width:100%;
color:white;
border-radius:6px;
cursor:pointer;
margin:20px 0;
}

.chatItem{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:8px;
cursor:pointer;
position:relative;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.deleteBtn{
position:absolute;
right:10px;
top:8px;
display:none;
}

.chatItem:hover .deleteBtn{
display:block;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#modeBar{
display:flex;
gap:10px;
padding:10px 20px;
background:#020617;
}

.modeBtn{
background:#1e293b;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

.modeBtn.active{
background:#22c55e;
}

#messages{
flex:1;
overflow:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:850px;
padding:14px;
border-radius:10px;
line-height:1.6;
}

.ai{background:#1e293b}
.user{
background:#2563eb;
align-self:flex-end;
}

#inputBar{
display:flex;
gap:10px;
padding:12px;
background:#020617;
}

#question{
flex:1;
padding:10px;
background:#0f172a;
border:1px solid #1e293b;
color:white;
border-radius:6px;
}

#send{
background:#22c55e;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
color:white;
}

#formPage{
padding:40px;
max-width:650px;
}

input{
width:100%;
margin-bottom:10px;
padding:10px;
background:#020617;
border:1px solid #1e293b;
color:white;
}

.generateBtn{
background:#22c55e;
border:none;
padding:12px;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="sidebar">

<div id="brand">
<h2>IdeaPilot</h2>
<p>Turn ideas into execution paths</p>
</div>

<button id="newChat" onclick="startNew()">+ New Chat</button>

<h4>Your Chats</h4>

<div id="chatList"></div>

</div>

<div id="main">

<div id="modeBar">

<button class="modeBtn active" onclick="setMode('idea',this)">Idea</button>
<button class="modeBtn" onclick="setMode('research',this)">Research</button>
<button class="modeBtn" onclick="setMode('build',this)">Build</button>

</div>

<div id="messages"></div>

<div id="formPage">

<h2>Clarify Your Idea. Build Your Path.</h2>

<input id="idea" placeholder="Idea">
<input id="why" placeholder="Why does this idea matter">
<input id="skills" placeholder="Skills">
<input id="resources" placeholder="Resources">
<input id="hours" placeholder="Hours per week">
<input id="income" placeholder="Monthly income target">
<input id="currency" placeholder="Currency">

<button class="generateBtn" onclick="generate()">Generate Direction Plan</button>

</div>

<div id="inputBar">

<input id="question" placeholder="Ask follow-up question">

<button id="send" onclick="sendQuestion()">Send</button>

</div>

</div>

<script>

let currentChatId=null
let currentMode="idea"

const messages=document.getElementById("messages")
const chatList=document.getElementById("chatList")

function cleanAI(text){
return text
.replace(/#{1,6}/g,"")
.replace(/\*\*/g,"")
.replace(/\n/g,"<br>")
}

function addMessage(content,type){

const div=document.createElement("div")
div.className="message "+type

if(type==="ai"){
div.innerHTML=cleanAI(content)
}else{
div.innerText=content
}

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
}

function setMode(mode,btn){

currentMode=mode

document.querySelectorAll(".modeBtn").forEach(b=>{
b.classList.remove("active")
})

btn.classList.add("active")
}

async function generate(){

messages.innerHTML=""
document.getElementById("formPage").style.display="none"

addMessage("Generating your AI direction plan...","ai")

const res=await fetch("/plan",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

idea:idea.value,
why:why.value,
skills:skills.value,
resources:resources.value,
hours:hours.value,
incomeGoal:income.value,
currency:currency.value

})

})

const data=await res.json()

messages.innerHTML=""

currentChatId=data.chatId
window.currentChatId=data.chatId

addMessage(data.reply,"ai")

loadChats()
}

async function sendQuestion(){

const input=document.getElementById("question")
const question=input.value.trim()

if(!question) return

addMessage(question,"user")

input.value=""

const formData=new FormData()

formData.append("chatId",window.currentChatId)
formData.append("question",question)
formData.append("mode",currentMode)

const res=await fetch("/followup",{method:"POST",body:formData})

const data=await res.json()

addMessage(data.reply,"ai")
}

async function loadChats(){

const res=await fetch("/chats")
let chats=await res.json()

chatList.innerHTML=""

chats.reverse().forEach(chat=>{

const div=document.createElement("div")
div.className="chatItem"

div.innerText=chat.title

div.onclick=()=>{
currentChatId=chat.id
window.currentChatId=chat.id

messages.innerHTML=""

chat.messages.forEach(m=>{
addMessage(m.content,m.role==="user"?"user":"ai")
})
}

chatList.appendChild(div)

})

}

function startNew(){

messages.innerHTML=""
document.getElementById("formPage").style.display="block"

}

document.getElementById("question").addEventListener("keypress",e=>{
if(e.key==="Enter") sendQuestion()
})

loadChats()

</script>

</body>
</html>
