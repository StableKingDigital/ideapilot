<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IdeaPilot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
border-right:1px solid #1e293b;
padding:20px;
overflow-y:auto;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.newChat{
background:#22c55e;
border:none;
padding:10px;
width:100%;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
color:white;
}

.chatItem{
background:#0f172a;
padding:10px;
border-radius:6px;
margin-bottom:8px;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* TOPBAR */

.topbar{
height:60px;
background:#020617;
border-bottom:1px solid #1e293b;
display:flex;
align-items:center;
padding:0 20px;
font-weight:bold;
cursor:pointer;
}

/* FORM */

.formBox{
padding:30px;
max-width:700px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#020617;
border:1px solid #1e293b;
color:white;
border-radius:6px;
}

.generateBtn{
margin-top:20px;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

/* CHAT */

.chatWindow{
flex:1;
padding:30px;
overflow:auto;
}

.aiMessage{
background:#0f172a;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
line-height:1.6;
}

/* MOBILE */

.mobileMenu{
display:none;
margin-right:10px;
font-size:20px;
}

@media (max-width:768px){

.sidebar{
position:fixed;
left:-260px;
top:0;
height:100%;
transition:0.3s;
z-index:1000;
}

.sidebar.open{
left:0;
}

.mobileMenu{
display:block;
}

body{
flex-direction:column;
}

}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<div class="logo">IdeaPilot</div>

<button class="newChat" onclick="newChat()">+ New Chat</button>

<div>Your Chats</div>

<div id="chatList"></div>

<div style="margin-top:20px">
<div class="chatItem">Idea</div>
<div class="chatItem">Research</div>
<div class="chatItem">Build</div>
</div>

</div>

<div class="main">

<div class="topbar" onclick="toggleSidebar()">

<span class="mobileMenu">☰</span>
IdeaPilot

</div>

<div class="formBox" id="formSection">

<h2>Clarify Your Idea</h2>

<input id="idea" placeholder="Your idea">

<input id="why" placeholder="Why it matters">

<input id="skills" placeholder="Skills">

<input id="resources" placeholder="Resources">

<input id="hours" placeholder="Hours per week">

<input id="budget" placeholder="Budget">

<button class="generateBtn" onclick="generatePlan()">Generate Plan</button>

</div>

<div class="chatWindow" id="chatWindow"></div>

</div>

<script>

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("open")

}

/* NEW CHAT */

function newChat(){

document.getElementById("formSection").style.display="block"
document.getElementById("chatWindow").innerHTML=""

}

/* GENERATE */

async function generatePlan(){

const idea = document.getElementById("idea").value
const why = document.getElementById("why").value
const skills = document.getElementById("skills").value
const resources = document.getElementById("resources").value
const hours = document.getElementById("hours").value
const budget = document.getElementById("budget").value

const res = await fetch("/plan",{

method:"POST",
headers:{'Content-Type':'application/json'},

body:JSON.stringify({
idea,
why,
skills,
resources,
hours,
budget
})

})

const data = await res.json()

document.getElementById("formSection").style.display="none"

document.getElementById("chatWindow").innerHTML=
"<div class='aiMessage'>"+data.reply+"</div>"

addChat(idea)

}

/* CHAT TITLES */

function addChat(title){

const chatList = document.getElementById("chatList")

const div = document.createElement("div")

div.className="chatItem"
div.innerText=title

chatList.prepend(div)

}

</script>

</body>
</html>
