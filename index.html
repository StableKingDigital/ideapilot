<!DOCTYPE html>
<html>
<head>

<title>IdeaPilot</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
height:100vh;
overflow:hidden;
}

/* APP CONTAINER */

#app{
display:flex;
height:100vh;
width:100%;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
overflow-y:auto;
transform:translateX(-100%);
transition:transform .25s ease;
z-index:2000;
}

#sidebar.open{
transform:translateX(0);
}

#brand h2{margin:0}
#brand p{font-size:12px;color:#94a3b8}

#newChat{
background:#22c55e;
border:none;
padding:12px;
width:100%;
color:white;
border-radius:6px;
cursor:pointer;
margin:20px 0;
}

/* CHAT LIST */

.chatItem{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
position:relative;
}

/* MENU */

.menu{
cursor:pointer;
padding:4px 8px;
}

.menuDropdown{
display:none;
position:absolute;
right:10px;
top:32px;
background:#020617;
border:1px solid #334155;
border-radius:6px;
flex-direction:column;
z-index:1000;
}

.menuDropdown button{
background:none;
border:none;
color:white;
padding:8px 12px;
text-align:left;
cursor:pointer;
}

.menuDropdown button:hover{
background:#1e293b;
}

/* OVERLAY */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
opacity:0;
pointer-events:none;
transition:opacity .25s;
z-index:1500;
}

#overlay.show{
opacity:1;
pointer-events:auto;
}

/* MAIN CHAT */

#main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
position:relative;
z-index:1;
}

/* TOP BAR */

#topBar{
display:flex;
align-items:center;
gap:10px;
padding:12px 16px;
background:#020617;
border-bottom:1px solid #1e293b;
flex-shrink:0;
}

#menuBtn{
font-size:22px;
cursor:pointer;
}

.modeBtn{
background:#1e293b;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

.modeBtn.active{
background:#22c55e;
}

/* CHAT AREA */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

/* MESSAGE STYLE */

.message{
max-width:700px;
padding:14px;
border-radius:10px;
line-height:1.6;
white-space:pre-wrap;
}

.ai{
background:#1e293b;
align-self:flex-start;
}

.user{
background:#2563eb;
align-self:flex-end;
}

img{
max-width:260px;
border-radius:8px;
margin-top:8px;
}

/* INPUT BAR */

#inputBar{
display:flex;
gap:10px;
padding:12px;
background:#020617;
border-top:1px solid #1e293b;
flex-shrink:0;
}

#inputContainer{
flex:1;
display:flex;
align-items:center;
background:#0f172a;
border:1px solid #1e293b;
border-radius:8px;
padding:6px;
}

#toolsBtn{
font-size:20px;
cursor:pointer;
margin-right:8px;
}

#question{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
}

#send{
background:#22c55e;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
color:white;
font-size:16px;
}

/* IDEA FORM */

#ideaForm{
padding:30px;
max-width:600px;
}

#ideaForm input{
width:100%;
margin-bottom:10px;
padding:10px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:6px;
}

#generateBtn{
background:#22c55e;
border:none;
padding:12px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="app">

<div id="overlay"></div>

<div id="sidebar">

<div id="brand">
<h2>IdeaPilot</h2>
<p>Turn ideas into execution paths</p>
</div>

<button id="newChat" onclick="startNew()">+ New Chat</button>

<h4>Your Chats</h4>

<div id="chatList"></div>

</div>

<div id="main">

<div id="topBar">

<div id="menuBtn">☰</div>

<button class="modeBtn active" onclick="setMode('idea',this)">Idea</button>
<button class="modeBtn" onclick="setMode('research',this)">Research</button>
<button class="modeBtn" onclick="setMode('build',this)">Build</button>

</div>

<div id="messages"></div>

<div id="ideaForm">

<h2>Clarify Your Idea</h2>

<input id="idea" placeholder="Your idea">
<input id="why" placeholder="Why it matters">
<input id="skills" placeholder="Your skills">
<input id="resources" placeholder="Resources">
<input id="hours" placeholder="Hours per week">
<input id="income" placeholder="Income goal">
<input id="currency" placeholder="Currency">

<button id="generateBtn" onclick="generatePlan()">Generate Plan</button>

</div>

<div id="inputBar">

<div id="inputContainer">
<div id="toolsBtn" onclick="document.getElementById('imageUpload').click()">+</div>
<input id="question" placeholder="Ask follow-up question">
</div>

<button id="send" onclick="sendMessage()">Send</button>

</div>

<input type="file" id="imageUpload" hidden accept="image/*">

</div>

</div>

<script>

/* SIDEBAR CONTROL */

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")
const menuBtn=document.getElementById("menuBtn")

menuBtn.onclick=()=>{
sidebar.classList.add("open")
overlay.classList.add("show")
}

overlay.onclick=()=>{
sidebar.classList.remove("open")
overlay.classList.remove("show")
}

/* SWIPE OPEN */

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchmove",e=>{
let x=e.touches[0].clientX
if(startX<30 && x>90){
sidebar.classList.add("open")
overlay.classList.add("show")
}
})

</script>

</body>
</html>
