<!DOCTYPE html>
<html>
<head>
<title>IdeaPilot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:260px;
background:#020617;
padding:20px;
}

#newChat{
background:#22c55e;
border:none;
padding:12px;
width:100%;
color:white;
border-radius:6px;
cursor:pointer;
margin:20px 0;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:700px;
padding:12px;
border-radius:10px;
line-height:1.5;
}

.ai{background:#1e293b}
.user{
background:#2563eb;
align-self:flex-end;
}

#inputBar{
display:flex;
gap:8px;
padding:12px;
background:#020617;
align-items:center;
}

#inputContainer{
flex:1;
display:flex;
align-items:center;
background:#0f172a;
border:1px solid #1e293b;
border-radius:10px;
padding:6px;
}

#toolsBtn{
font-size:20px;
cursor:pointer;
padding:6px;
}

#question{
flex:1;
border:none;
background:transparent;
color:white;
outline:none;
padding:8px;
}

#send{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
color:white;
}

</style>
</head>

<body>

<div id="sidebar">

<h2>IdeaPilot</h2>

<button id="newChat" onclick="startNew()">+ New Chat</button>

</div>

<div id="main">

<div id="messages"></div>

<div id="inputBar">

<div id="inputContainer">

<div id="toolsBtn" onclick="uploadImage()">+</div>

<input id="question" placeholder="Ask follow-up question">

<input type="file" id="imageUpload" accept="image/*" hidden>

</div>

<button id="send" onclick="sendQuestion()">Send</button>

</div>

</div>

<script>

let history=[]

const messages=document.getElementById("messages")

function cleanAI(text){

return text
.replace(/\*\*/g,"")
.replace(/#{1,6}/g,"")

}

function addMessage(content,type){

const div=document.createElement("div")
div.className="message "+type

div.innerText=content

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

function uploadImage(){
document.getElementById("imageUpload").click()
}

async function sendQuestion(){

const input=document.getElementById("question")
const question=input.value.trim()

if(!question) return

addMessage(question,"user")

history.push({
role:"user",
content:question
})

input.value=""

const formData=new FormData()

formData.append("question",question)
formData.append("messages",JSON.stringify(history))

const res=await fetch("/followup",{
method:"POST",
body:formData
})

const data=await res.json()

history=data.history

addMessage(cleanAI(data.reply),"ai")

}

function startNew(){

messages.innerHTML=""
history=[]

}

</script>

</body>
</html>
