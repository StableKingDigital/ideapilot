<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* MOBILE HEADER */

.mobileHeader{
display:none;
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:#020617;
border-bottom:1px solid #1e293b;
align-items:center;
padding:0 15px;
z-index:1000;
}

.menuBtn{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
margin-right:15px;
}

.mobileTitle{
font-size:18px;
font-weight:bold;
}


/* MOBILE RESPONSIVE */

@media (max-width:768px){

.mobileHeader{
display:flex;
}

#sidebar{
position:fixed;
top:0;
left:-260px;
height:100%;
width:260px;
background:#020617;
transition:0.3s;
z-index:1200;
}

#sidebar.open{
left:0;
}

#main{
margin-left:0 !important;
padding-top:80px;
}

}

</style>

<div class="mobileHeader">

<button class="menuBtn" onclick="toggleSidebar()">☰</button>

<div class="mobileTitle">
IdeaPilot
</div>

</div>

<script>

function toggleSidebar(){

const sidebar = document.getElementById("sidebar")

if(sidebar.classList.contains("open")){
sidebar.classList.remove("open")
}else{
sidebar.classList.add("open")
}

}

</script>
