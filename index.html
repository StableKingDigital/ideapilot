<!DOCTYPE html>

<html>
<head>
<title>IdeaPilot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box}

html,body{
margin:0;
height:100dvh;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
}

input,textarea{
font-size:16px;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
overflow-y:auto;
transform:translateX(-100%);
transition:transform .25s;
z-index:2000;
}

#sidebar.open{
transform:translateX(0);
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:1500;
}

#overlay.show{
display:block;
}

#brand h2{margin:0}
#brand p{font-size:12px;color:#94a3b8}

#newChat{
background:#22c55e;
border:none;
padding:12px;
width:100%;
border-radius:6px;
color:white;
cursor:pointer;
margin:20px 0;
}

/* CHAT LIST */

.chatItem{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
position:relative;
}

/* MENU */

.menu{
cursor:pointer;
padding:4px 8px;
}

.menuDropdown{
display:none;
position:absolute;
right:10px;
top:32px;
background:#020617;
border:1px solid #334155;
border-radius:6px;
flex-direction:column;
z-index:3000;
}

.menuDropdown button{
background:none;
border:none;
color:white;
padding:8px 12px;
text-align:left;
cursor:pointer;
}

.menuDropdown button:hover{
background:#1e293b;
}

/* APP */

#app{
display:flex;
flex-direction:column;
height:100%;
}

/* TOP BAR */

#topBar{
flex-shrink:0;
display:flex;
align-items:center;
gap:10px;
padding:12px 16px;
background:#020617;
border-bottom:1px solid #1e293b;
}

#menuBtn{
font-size:22px;
cursor:pointer;
}

.modeBtn{
background:#1e293b;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

.modeBtn.active{
background:#22c55e;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:14px;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:100%;
padding:14px;
border-radius:10px;
line-height:1.6;
white-space:pre-wrap;
}

.ai{
background:#1e293b;
align-self:flex-start;
}

.user{
background:#2563eb;
align-self:flex-end;
}

img{
max-width:220px;
border-radius:8px;
margin-top:8px;
}

/* INPUT BAR */

#inputBar{
flex-shrink:0;
display:flex;
gap:8px;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

#inputContainer{
flex:1;
display:flex;
align-items:center;
min-width:0;
background:#0f172a;
border:1px solid #1e293b;
border-radius:8px;
padding:6px;
}

#toolsBtn{
font-size:20px;
cursor:pointer;
margin-right:8px;
}

textarea{
flex:1;
resize:none;
background:transparent;
border:none;
color:white;
outline:none;
min-height:20px;
}

#send{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* IDEA FORM */

.ideaCard{
background:#020617;
padding:20px;
border-radius:10px;
border:1px solid #1e293b;
}

.ideaCard input{
width:100%;
margin-bottom:10px;
padding:10px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:6px;
}

#generateBtn{
background:#22c55e;
border:none;
padding:12px;
border-radius:6px;
color:white;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div id="overlay"></div>

<div id="sidebar">

<div id="brand">
<h2>IdeaPilot</h2>
<p>Turn ideas into execution paths</p>
</div>

<button id="newChat" onclick="startNew()">+ New Chat</button>

<h4>Your Chats</h4>
<div id="chatList"></div>

</div>

<div id="app">

<div id="topBar">

<div id="menuBtn">☰</div>

<button class="modeBtn active" onclick="setMode('idea',this)">Idea</button> <button class="modeBtn" onclick="setMode('research',this)">Research</button> <button class="modeBtn" onclick="setMode('build',this)">Build</button>

</div>

<div id="messages"></div>

<div id="inputBar">

<div id="inputContainer">
<div id="toolsBtn" onclick="document.getElementById('imageUpload').click()">+</div>
<textarea id="question" placeholder="Ask follow-up question"></textarea>
</div>

<button id="send" onclick="sendMessage()">Send</button>

</div>

<input type="file" id="imageUpload" hidden accept="image/*">

</div>

<script>

/* SIDEBAR */

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")
const menuBtn=document.getElementById("menuBtn")

menuBtn.onclick=()=>{
sidebar.classList.add("open")
overlay.classList.add("show")
}

overlay.onclick=()=>{
sidebar.classList.remove("open")
overlay.classList.remove("show")
}

/* CHAT ENGINE */

let currentChatId=null
let currentMode="idea"
let pendingImage=null

const messages=document.getElementById("messages")
const chatList=document.getElementById("chatList")
const textarea=document.getElementById("question")

function cleanAI(text){
return text.replace(/\*\*/g,"").replace(/###/g,"").replace(/##/g,"").replace(/#/g,"")
}

function setMode(mode,btn){
currentMode=mode
document.querySelectorAll(".modeBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

function addAI(text){
text=cleanAI(text)
const div=document.createElement("div")
div.className="message ai"
div.innerText=text
messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
}

function addUser(text){
const div=document.createElement("div")
div.className="message user"
div.innerText=text
messages.appendChild(div)
}

/* IMAGE PREVIEW */

document.getElementById("imageUpload").addEventListener("change",function(){
const file=this.files[0]
if(!file) return
pendingImage=file
const reader=new FileReader()
reader.onload=e=>{
const div=document.createElement("div")
div.className="message user"
const img=document.createElement("img")
img.src=e.target.result
div.appendChild(img)
messages.appendChild(div)
}
reader.readAsDataURL(file)
})

/* SEND MESSAGE */

async function sendMessage(){

const text=textarea.value.trim()
if(!text && !pendingImage) return

textarea.value=""
addUser(text)

if(!currentChatId){

const res=await fetch("/create-chat",{method:"POST"})
const data=await res.json()
currentChatId=data.chatId

}

const formData=new FormData()
formData.append("chatId",currentChatId)
formData.append("question",text)
formData.append("mode",currentMode)

if(pendingImage){
formData.append("file",pendingImage)
}

pendingImage=null

const res=await fetch("/followup",{method:"POST",body:formData})
const data=await res.json()

addAI(data.reply)

loadChats()

}

/* CHAT HISTORY */

async function loadChats(){

const res=await fetch("/chats")
const chats=await res.json()

chatList.innerHTML=""

chats.forEach(chat=>{

const div=document.createElement("div")
div.className="chatItem"

const title=document.createElement("span")
title.innerText=chat.title||"Untitled Chat"

const menu=document.createElement("div")
menu.className="menu"
menu.innerText="⋯"

const dropdown=document.createElement("div")
dropdown.className="menuDropdown"

const rename=document.createElement("button")
rename.innerText="Rename"

rename.onclick=()=>{
const newTitle=prompt("New title")
if(!newTitle) return

fetch("/rename-chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id:chat.id,title:newTitle})
}).then(loadChats)
}

const del=document.createElement("button")
del.innerText="Delete"

del.onclick=()=>{
fetch("/delete-chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id:chat.id})
}).then(loadChats)
}

dropdown.appendChild(rename)
dropdown.appendChild(del)

menu.onclick=(e)=>{
e.stopPropagation()
dropdown.style.display =
dropdown.style.display==="flex" ? "none" : "flex"
}

div.appendChild(title)
div.appendChild(menu)
div.appendChild(dropdown)

div.onclick=()=>{
currentChatId=chat.id
messages.innerHTML=""
chat.messages.forEach(m=>{
if(m.role==="user") addUser(m.content)
else addAI(m.content)
})
sidebar.classList.remove("open")
overlay.classList.remove("show")
}

chatList.appendChild(div)

})

}

function startNew(){

messages.innerHTML=""
currentChatId=null

addAI("Start a new idea discussion or generate a structured startup plan.")

const tool=document.createElement("div")
tool.className="ideaCard"
tool.innerHTML=`<button onclick="showIdeaForm()">Generate Startup Plan</button>`

messages.appendChild(tool)

}

showIdeaForm()
loadChats()

</script>

</body>
</html>
