<!DOCTYPE html>

<html>
<head>
<title>IdeaPilot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box}

html,body{
margin:0;
height:100dvh;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
}

input,textarea{
font-size:16px;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
overflow-y:auto;
transform:translateX(-100%);
transition:transform .25s;
z-index:2000;
display:flex;
flex-direction:column;
}

#sidebar.open{
transform:translateX(0);
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:1500;
}

#overlay.show{
display:block;
}

#brand h2{margin:0}
#brand p{font-size:12px;color:#94a3b8}

#newChat{
background:#22c55e;
border:none;
padding:12px;
width:100%;
border-radius:6px;
color:white;
cursor:pointer;
margin:20px 0;
}

.chatItem{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:8px;
cursor:pointer;
}

/* FOOTER */

#sidebarFooter{
margin-top:auto;
padding-top:20px;
border-top:1px solid #1e293b;
}

.footerBtn{
width:100%;
padding:10px;
margin-top:8px;
background:#1e293b;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
text-align:left;
}

.footerBtn:hover{
background:#334155;
}

/* APP */

#app{
display:flex;
flex-direction:column;
height:100%;
}

#topBar{
flex-shrink:0;
display:flex;
align-items:center;
gap:10px;
padding:12px 16px;
background:#020617;
border-bottom:1px solid #1e293b;
}

#menuBtn{
font-size:22px;
cursor:pointer;
}

.modeBtn{
background:#1e293b;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

.modeBtn.active{
background:#22c55e;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:14px;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:100%;
padding:14px;
border-radius:10px;
line-height:1.6;
white-space:pre-wrap;
}

.ai{
background:#1e293b;
align-self:flex-start;
}

.user{
background:#2563eb;
align-self:flex-end;
}

/* INPUT */

#inputBar{
flex-shrink:0;
display:flex;
gap:8px;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

#inputContainer{
flex:1;
display:flex;
align-items:center;
min-width:0;
background:#0f172a;
border:1px solid #1e293b;
border-radius:8px;
padding:6px;
}

textarea{
flex:1;
resize:none;
background:transparent;
border:none;
color:white;
outline:none;
}

#send{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* IDEA FORM */

.ideaCard{
background:#020617;
padding:20px;
border-radius:10px;
border:1px solid #1e293b;
max-width:600px;
}

.ideaCard input{
width:100%;
margin-bottom:10px;
padding:10px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:6px;
}

#generateBtn{
background:#22c55e;
border:none;
padding:12px;
border-radius:6px;
color:white;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div id="overlay"></div>

<div id="sidebar">

<div id="brand">
<h2>IdeaPilot</h2>
<p>Turn ideas into execution paths</p>
</div>

<button id="newChat" onclick="startNew()">+ New Chat</button>

<h4>Your Chats</h4>
<div id="chatList"></div>

<div id="sidebarFooter">

<button class="footerBtn" onclick="changePassword()">⚙ Change Password</button>

<button class="footerBtn" onclick="logout()">🚪 Logout</button>

</div>

</div>

<div id="app">

<div id="topBar">

<div id="menuBtn">☰</div>

<button class="modeBtn active" onclick="setMode('idea',this)">Idea</button> <button class="modeBtn" onclick="setMode('research',this)">Research</button> <button class="modeBtn" onclick="setMode('build',this)">Build</button>

</div>

<div id="messages"></div>

<div id="inputBar">

<div id="inputContainer">
<textarea id="question" placeholder="Ask follow-up question"></textarea>
</div>

<button id="send" onclick="sendMessage()">Send</button>

</div>

</div>

<script>

/* SIDEBAR */

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")
const menuBtn=document.getElementById("menuBtn")

menuBtn.onclick=()=>{
sidebar.classList.add("open")
overlay.classList.add("show")
}

overlay.onclick=()=>{
sidebar.classList.remove("open")
overlay.classList.remove("show")
}

/* ACCOUNT */

function logout(){
window.location="/logout"
}

async function changePassword(){

const pass=prompt("Enter new password")

if(!pass) return

const res=await fetch("/change-password",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({password:pass})
})

const data=await res.json()

if(data.status){
alert("Password updated")
}else{
alert("Update failed")
}

}

/* CHAT ENGINE */

let currentChatId=null
let currentMode="idea"

const messages=document.getElementById("messages")
const chatList=document.getElementById("chatList")
const textarea=document.getElementById("question")

function addAI(text){
const div=document.createElement("div")
div.className="message ai"
div.innerText=text
messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
}

function addUser(text){
const div=document.createElement("div")
div.className="message user"
div.innerText=text
messages.appendChild(div)
}

/* IDEA FORM */

function showIdeaForm(){

messages.innerHTML=""

const form=document.createElement("div")
form.className="ideaCard"

form.innerHTML=`

<h2>Generate Startup Plan</h2>

<input id="idea" placeholder="Your idea">

<input id="why" placeholder="Why it matters">

<input id="skills" placeholder="Your skills">

<input id="resources" placeholder="Resources">

<input id="hours" placeholder="Hours per week">

<input id="income" placeholder="Income goal">

<input id="currency" placeholder="Currency">

<button id="generateBtn" onclick="generatePlan()">Generate Plan</button>

`

messages.appendChild(form)

}

async function generatePlan(){

const res=await fetch("/plan",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
idea:idea.value,
why:why.value,
skills:skills.value,
resources:resources.value,
hours:hours.value,
incomeGoal:income.value,
currency:currency.value
})
})

const data=await res.json()

currentChatId=data.chatId

addAI(data.reply)

loadChats()

}

/* SEND MESSAGE */

async function sendMessage(){

const text=textarea.value.trim()
if(!text) return

textarea.value=""

addUser(text)

const formData=new FormData()
formData.append("chatId",currentChatId)
formData.append("question",text)
formData.append("mode",currentMode)

const res=await fetch("/followup",{method:"POST",body:formData})
const data=await res.json()

addAI(data.reply)

}

/* CHAT LIST */

async function loadChats(){

const res=await fetch("/chats")
const chats=await res.json()

chatList.innerHTML=""

chats.reverse().forEach(chat=>{

const div=document.createElement("div")
div.className="chatItem"
div.innerText=chat.title||"Chat"

div.onclick=()=>{
currentChatId=chat.id
messages.innerHTML=""

chat.messages.forEach(m=>{
if(m.role==="user") addUser(m.content)
else addAI(m.content)
})

sidebar.classList.remove("open")
overlay.classList.remove("show")
}

chatList.appendChild(div)

})

}

function startNew(){

currentChatId=null
showIdeaForm()

}

/* INITIAL LOAD */

showIdeaForm()
loadChats()

</script>

</body>
</html>
