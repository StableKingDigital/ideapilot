<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IdeaPilot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
border-right:1px solid #1e293b;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.modeBtn{
background:#0f172a;
border:none;
padding:10px;
border-radius:6px;
margin-bottom:10px;
cursor:pointer;
color:white;
}

.newChat{
background:#22c55e;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
margin-bottom:20px;
color:white;
}

.chatItem{
background:#0f172a;
padding:10px;
border-radius:6px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.chatMenu{
background:none;
border:none;
color:white;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* FORM */

.formBox{
padding:30px;
max-width:700px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#020617;
border:1px solid #1e293b;
color:white;
border-radius:6px;
}

.generateBtn{
margin-top:20px;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

/* CHAT */

.chatWindow{
flex:1;
padding:30px;
overflow:auto;
}

.aiMessage{
background:#0f172a;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
line-height:1.6;
margin-bottom:20px;
}

/* INPUT BAR */

.inputBar{
display:flex;
border-top:1px solid #1e293b;
padding:10px;
gap:10px;
}

.inputBar input[type=text]{
flex:1;
background:#020617;
border:1px solid #1e293b;
color:white;
border-radius:6px;
padding:10px;
}

.sendBtn{
background:#22c55e;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">IdeaPilot</div>

<button class="modeBtn" onclick="setMode('idea')">Idea</button>
<button class="modeBtn" onclick="setMode('research')">Research</button>
<button class="modeBtn" onclick="setMode('build')">Build</button>

<button class="newChat" onclick="newChat()">+ New Chat</button>

<div>Your Chats</div>

<div id="chatList"></div>

</div>

<div class="main">

<div class="formBox" id="formSection">

<h2>Clarify Your Idea</h2>

<input id="idea" placeholder="Your idea">

<input id="why" placeholder="Why it matters">

<input id="skills" placeholder="Skills">

<input id="resources" placeholder="Resources">

<input id="hours" placeholder="Hours per week">

<input id="budget" placeholder="Budget">

<button class="generateBtn" onclick="generatePlan()">Generate Plan</button>

</div>

<div class="chatWindow" id="chatWindow"></div>

<div class="inputBar">

<input type="file" id="imageUpload">

<input type="text" id="followup" placeholder="Ask follow-up question">

<button class="sendBtn" onclick="sendFollowup()">Send</button>

</div>

</div>

<script>

let currentMode = "idea"

/* MODE SWITCH */

function setMode(mode){
currentMode = mode
}

/* NEW CHAT */

function newChat(){
document.getElementById("formSection").style.display="block"
document.getElementById("chatWindow").innerHTML=""
}

/* GENERATE PLAN */

async function generatePlan(){

const idea = document.getElementById("idea").value
const why = document.getElementById("why").value
const skills = document.getElementById("skills").value
const resources = document.getElementById("resources").value
const hours = document.getElementById("hours").value
const budget = document.getElementById("budget").value

const res = await fetch("/generate",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
idea,
why,
skills,
resources,
hours,
budget
})
})

const data = await res.json()

document.getElementById("formSection").style.display="none"

document.getElementById("chatWindow").innerHTML +=
<div class="aiMessage">${data.reply}</div>

addChat(idea)

}

/* FOLLOW UP */

async function sendFollowup(){

const message = document.getElementById("followup").value

if(!message) return

const res = await fetch("/followup",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
message,
mode:currentMode
})
})

const data = await res.json()

document.getElementById("chatWindow").innerHTML +=
<div class="aiMessage">${data.reply}</div>

document.getElementById("followup").value=""

}

/* CHAT TITLES */

function addChat(title){

const chatList = document.getElementById("chatList")

const div = document.createElement("div")
div.className="chatItem"

div.innerHTML = 
<span>${title}</span>
<button class="chatMenu" onclick="chatOptions(this)">⋯</button>


chatList.prepend(div)

}

/* RENAME / DELETE */

function chatOptions(btn){

const action = prompt("Type rename or delete")

if(action==="delete"){
btn.parentElement.remove()
}

if(action==="rename"){
const name = prompt("New chat name")
btn.parentElement.querySelector("span").innerText = name
}

}

</script>

</body>
</html>
