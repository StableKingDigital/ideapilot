<!DOCTYPE html>
<html>
<head>

<title>IdeaPilot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box;}

:root{
--app-height:100vh;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
height:var(--app-height);
overflow:hidden;
}

/* APP */

#app{
display:flex;
height:var(--app-height);
width:100%;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:var(--app-height);
background:#020617;
padding:20px;
overflow-y:auto;
transform:translateX(-100%);
transition:transform .25s ease;
z-index:2000;
}

#sidebar.open{
transform:translateX(0);
}

#brand h2{margin:0}
#brand p{font-size:12px;color:#94a3b8}

#newChat{
background:#22c55e;
border:none;
padding:12px;
width:100%;
color:white;
border-radius:6px;
cursor:pointer;
margin:20px 0;
}

.chatItem{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:8px;
cursor:pointer;
}

/* OVERLAY */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:var(--app-height);
background:rgba(0,0,0,.4);
opacity:0;
pointer-events:none;
transition:opacity .25s;
z-index:1500;
}

#overlay.show{
opacity:1;
pointer-events:auto;
}

/* MAIN CHAT PANEL */

#main{
flex:1;
display:flex;
flex-direction:column;
height:var(--app-height);
overflow:hidden;
}

/* TOP BAR */

#topBar{
flex-shrink:0;
display:flex;
align-items:center;
gap:10px;
padding:12px 16px;
background:#020617;
border-bottom:1px solid #1e293b;
}

#menuBtn{
font-size:22px;
cursor:pointer;
}

.modeBtn{
background:#1e293b;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

.modeBtn.active{
background:#22c55e;
}

/* CHAT AREA */

#messages{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:14px;
}

/* MESSAGE */

.message{
max-width:700px;
padding:14px;
border-radius:10px;
line-height:1.6;
white-space:pre-wrap;
}

.ai{
background:#1e293b;
align-self:flex-start;
}

.user{
background:#2563eb;
align-self:flex-end;
}

img{
max-width:260px;
border-radius:8px;
margin-top:8px;
}

/* INPUT BAR */

#inputBar{
flex-shrink:0;
display:flex;
gap:10px;
padding:12px;
background:#020617;
border-top:1px solid #1e293b;
}

#inputContainer{
flex:1;
display:flex;
align-items:center;
background:#0f172a;
border:1px solid #1e293b;
border-radius:8px;
padding:6px;
}

#toolsBtn{
font-size:20px;
cursor:pointer;
margin-right:8px;
}

#question{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
}

#send{
background:#22c55e;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
color:white;
}

/* IDEA FORM */

#ideaForm{
padding:30px;
max-width:600px;
}

#ideaForm input{
width:100%;
margin-bottom:10px;
padding:10px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:6px;
}

#generateBtn{
background:#22c55e;
border:none;
padding:12px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="app">

<div id="overlay"></div>

<div id="sidebar">

<div id="brand">
<h2>IdeaPilot</h2>
<p>Turn ideas into execution paths</p>
</div>

<button id="newChat" onclick="startNew()">+ New Chat</button>

<h4>Your Chats</h4>

<div id="chatList"></div>

</div>

<div id="main">

<div id="topBar">

<div id="menuBtn">☰</div>

<button class="modeBtn active" onclick="setMode('idea',this)">Idea</button>
<button class="modeBtn" onclick="setMode('research',this)">Research</button>
<button class="modeBtn" onclick="setMode('build',this)">Build</button>

</div>

<div id="messages"></div>

<div id="ideaForm">

<h2>Clarify Your Idea</h2>

<input id="idea" placeholder="Your idea">
<input id="why" placeholder="Why it matters">
<input id="skills" placeholder="Your skills">
<input id="resources" placeholder="Resources">
<input id="hours" placeholder="Hours per week">
<input id="income" placeholder="Income goal">
<input id="currency" placeholder="Currency">

<button id="generateBtn" onclick="generatePlan()">Generate Plan</button>

</div>

<div id="inputBar">

<div id="inputContainer">
<div id="toolsBtn" onclick="document.getElementById('imageUpload').click()">+</div>
<input id="question" placeholder="Ask follow-up question">
</div>

<button id="send" onclick="sendMessage()">Send</button>

</div>

<input type="file" id="imageUpload" hidden accept="image/*">

</div>

</div>

<script>

/* DYNAMIC MOBILE HEIGHT */

function setAppHeight(){
document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`)
}

window.addEventListener('resize', setAppHeight)
setAppHeight()

/* SIDEBAR */

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")
const menuBtn=document.getElementById("menuBtn")

menuBtn.onclick=()=>{
sidebar.classList.add("open")
overlay.classList.add("show")
}

overlay.onclick=()=>{
sidebar.classList.remove("open")
overlay.classList.remove("show")
}

/* CHAT ENGINE */

let currentChatId=null
let currentMode="idea"
let pendingImage=null

const messages=document.getElementById("messages")
const chatList=document.getElementById("chatList")

function cleanAI(text){
return text
.replace(/\*\*/g,"")
.replace(/###/g,"")
.replace(/##/g,"")
.replace(/#/g,"")
}

function setMode(mode,btn){
currentMode=mode
document.querySelectorAll(".modeBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

function addAI(text){
text=cleanAI(text)
const div=document.createElement("div")
div.className="message ai"
div.innerText=text
messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
}

function addUser(text){
const div=document.createElement("div")
div.className="message user"
div.innerText=text
messages.appendChild(div)
}

function addUserImage(src){
const div=document.createElement("div")
div.className="message user"
const img=document.createElement("img")
img.src=src
div.appendChild(img)
messages.appendChild(div)
}

document.getElementById("imageUpload").addEventListener("change",function(){

const file=this.files[0]
if(!file) return

pendingImage=file

const reader=new FileReader()

reader.onload=function(e){
addUserImage(e.target.result)
}

reader.readAsDataURL(file)

})

async function generatePlan(){

document.getElementById("ideaForm").style.display="none"
messages.innerHTML=""

addAI("Generating startup plan...")

const res=await fetch("/plan",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
idea:idea.value,
why:why.value,
skills:skills.value,
resources:resources.value,
hours:hours.value,
incomeGoal:income.value,
currency:currency.value
})
})

const data=await res.json()

currentChatId=data.chatId

addAI(data.reply)

loadChats()

}

async function sendMessage(){

const text=document.getElementById("question").value.trim()

if(!text && !pendingImage) return

if(text) addUser(text)

const formData=new FormData()

formData.append("chatId",currentChatId)
formData.append("question",text)
formData.append("mode",currentMode)

if(pendingImage){
formData.append("file",pendingImage)
}

document.getElementById("question").value=""
pendingImage=null

const res=await fetch("/followup",{method:"POST",body:formData})

const data=await res.json()

addAI(data.reply)

}

async function loadChats(){

const res=await fetch("/chats")
const chats=await res.json()

chatList.innerHTML=""

chats.reverse().forEach(chat=>{

const div=document.createElement("div")
div.className="chatItem"
div.innerText=chat.title||"Untitled Chat"

div.onclick=()=>{

currentChatId=chat.id
messages.innerHTML=""

chat.messages.forEach(m=>{
if(m.role==="user") addUser(m.content)
else addAI(m.content)
})

}

chatList.appendChild(div)

})

}

function startNew(){
messages.innerHTML=""
document.getElementById("ideaForm").style.display="block"
}

loadChats()

</script>

</body>
</html>
