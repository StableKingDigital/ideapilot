<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IdeaPilot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
height:100vh;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
border-right:1px solid #1e293b;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.modeBtn{
background:#0f172a;
border:none;
padding:10px;
border-radius:6px;
margin-bottom:10px;
cursor:pointer;
color:white;
}

.newChat{
background:#22c55e;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
margin-bottom:20px;
color:white;
}

.chatItem{
background:#0f172a;
padding:10px;
border-radius:6px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* FORM PAGE */

.formPage{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.formBox{
width:500px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#020617;
border:1px solid #1e293b;
color:white;
border-radius:6px;
}

.generateBtn{
margin-top:20px;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* DASHBOARD */

.dashboard{
display:none;
flex:1;
flex-direction:column;
}

.chatWindow{
flex:1;
padding:30px;
overflow:auto;
}

.message{
background:#0f172a;
padding:15px;
border-radius:10px;
margin-bottom:15px;
white-space:pre-wrap;
}

/* INPUT BAR */

.inputBar{
display:flex;
gap:10px;
border-top:1px solid #1e293b;
padding:10px;
}

.inputBar input[type=text]{
flex:1;
padding:10px;
background:#020617;
border:1px solid #1e293b;
color:white;
border-radius:6px;
}

.sendBtn{
background:#22c55e;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">IdeaPilot</div>

<button class="modeBtn" onclick="setMode('idea')">Idea</button>
<button class="modeBtn" onclick="setMode('research')">Research</button>
<button class="modeBtn" onclick="setMode('build')">Build</button>

<button class="newChat" onclick="newChat()">+ New Chat</button>

<div>Your Chats</div>

<div id="chatList"></div>

</div>

<div class="main">

<!-- FORM PAGE -->

<div class="formPage" id="formPage">

<div class="formBox">

<h2>Clarify Your Idea</h2>

<input id="idea" placeholder="Your idea">
<input id="why" placeholder="Why it matters">
<input id="skills" placeholder="Skills">
<input id="resources" placeholder="Resources">
<input id="hours" placeholder="Hours per week">
<input id="budget" placeholder="Budget">

<button class="generateBtn" onclick="generatePlan()">Generate Plan</button>

</div>
</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

<div class="chatWindow" id="chatWindow"></div>

<div class="inputBar">

<input type="file" id="imageUpload">

<input type="text" id="followup" placeholder="Ask follow-up">

<button class="sendBtn" onclick="sendFollowup()">Send</button>

</div>

</div>

</div>

<script>

let currentMode = "idea"

/* MODE */

function setMode(mode){
currentMode = mode
}

/* NEW CHAT */

function newChat(){
document.getElementById("dashboard").style.display="none"
document.getElementById("formPage").style.display="flex"
document.getElementById("chatWindow").innerHTML=""
}

/* GENERATE PLAN */

async function generatePlan(){

const idea=document.getElementById("idea").value

if(!idea){
alert("Please enter your idea")
return
}

try{

const res = await fetch("/generate",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
idea:idea,
why:document.getElementById("why").value,
skills:document.getElementById("skills").value,
resources:document.getElementById("resources").value,
hours:document.getElementById("hours").value,
budget:document.getElementById("budget").value
})
})

const data = await res.json()

document.getElementById("formPage").style.display="none"
document.getElementById("dashboard").style.display="flex"

addMessage(data.reply)

addChat(idea)

}catch(err){

console.log(err)
alert("Server error")

}

}

/* FOLLOW UP */

async function sendFollowup(){

const message=document.getElementById("followup").value
const image=document.getElementById("imageUpload").files[0]

if(!message && !image) return

const chat=document.getElementById("chatWindow")

chat.innerHTML+=`<div class="message"><b>You:</b> ${message}</div>`

try{

const formData=new FormData()

formData.append("message",message)
formData.append("mode",currentMode)

if(image){
formData.append("image",image)
}

const res=await fetch("/followup",{
method:"POST",
body:formData
})

const data=await res.json()

addMessage(data.reply)

document.getElementById("followup").value=""

}catch(err){

console.log(err)
alert("Follow up failed")

}

}

/* ADD MESSAGE */

function addMessage(text){

const chat=document.getElementById("chatWindow")

chat.innerHTML+=`<div class="message">${text}</div>`

chat.scrollTop=chat.scrollHeight

}

/* CHAT LIST */

function addChat(title){

const chatList=document.getElementById("chatList")

const div=document.createElement("div")

div.className="chatItem"

div.innerHTML=`
<span>${title}</span>
<button onclick="chatOptions(this)">⋯</button>
`

chatList.prepend(div)

}

/* RENAME / DELETE */

function chatOptions(btn){

const action=prompt("Type rename or delete")

if(action==="delete"){
btn.parentElement.remove()
}

if(action==="rename"){
const name=prompt("New name")
if(name){
btn.parentElement.querySelector("span").innerText=name
}
}

}

</script>

</body>
</html>
