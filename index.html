<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IdeaPilot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* FORM SCREEN */

#formScreen{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

.formBox{
width:600px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#020617;
border:1px solid #1e293b;
color:white;
border-radius:6px;
}

button{
margin-top:15px;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
}

/* DASHBOARD */

#dashboardScreen{
display:none;
height:100vh;
}

.topbar{
height:60px;
background:#020617;
border-bottom:1px solid #1e293b;
display:flex;
align-items:center;
padding:0 20px;
cursor:pointer;
font-weight:bold;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#020617;
border-right:1px solid #1e293b;
padding:20px;
transition:0.3s;
}

#sidebar.open{
left:0;
}

.menuItem{
padding:10px;
background:#0f172a;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

/* CHAT */

#chatWindow{
padding:30px;
overflow:auto;
height:calc(100vh - 60px);
}

.aiMessage{
background:#0f172a;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
line-height:1.6;
}

/* MOBILE */

@media (max-width:768px){

.formBox{
width:90%;
}

}

</style>

</head>

<body>

<!-- FORM SCREEN -->

<div id="formScreen">

<div class="formBox">

<h2>Clarify Your Idea</h2>

<input id="idea" placeholder="Your idea">

<input id="why" placeholder="Why it matters">

<input id="skills" placeholder="Your skills">

<input id="resources" placeholder="Resources">

<input id="hours" placeholder="Hours per week">

<input id="budget" placeholder="Budget">

<button onclick="generatePlan()">Generate Plan</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboardScreen">

<div class="topbar" onclick="toggleMenu()">
☰ IdeaPilot
</div>

<div id="sidebar">

<div class="menuItem" onclick="newChat()">+ New Chat</div>

<div style="margin-top:20px;font-size:14px;opacity:0.7">Your Chats</div>

<div id="chatList"></div>

<div style="margin-top:30px">

<div class="menuItem">Idea</div>
<div class="menuItem">Research</div>
<div class="menuItem">Build</div>

</div>

</div>

<div id="chatWindow"></div>

</div>

<script>

/* GENERATE PLAN */

async function generatePlan(){

const idea = document.getElementById("idea").value
const why = document.getElementById("why").value
const skills = document.getElementById("skills").value
const resources = document.getElementById("resources").value
const hours = document.getElementById("hours").value
const budget = document.getElementById("budget").value

const res = await fetch("/generate",{

method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
idea,
why,
skills,
resources,
hours,
budget
})

})

const data = await res.json()

document.getElementById("formScreen").style.display="none"
document.getElementById("dashboardScreen").style.display="block"

document.getElementById("chatWindow").innerHTML =
"<div class='aiMessage'>" + data.reply + "</div>"

addChatTitle(idea)

}

/* SIDEBAR */

function toggleMenu(){

document.getElementById("sidebar").classList.toggle("open")

}

/* NEW CHAT */

function newChat(){

document.getElementById("chatWindow").innerHTML=""

document.getElementById("formScreen").style.display="flex"
document.getElementById("dashboardScreen").style.display="none"

}

/* CHAT TITLES */

function addChatTitle(title){

const chatList = document.getElementById("chatList")

const div = document.createElement("div")

div.className="menuItem"

div.innerText = title

chatList.prepend(div)

}

</script>

</body>
</html>
