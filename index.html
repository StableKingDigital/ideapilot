<!DOCTYPE html>
<html>
<head>

<title>IdeaPilot</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
height:100vh;
overflow:hidden;
display:flex;
}

/* SIDEBAR */

#sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100vh;
background:#020617;
padding:20px;
overflow-y:auto;
transition:0.25s;
z-index:2000;
}

#sidebar.open{
left:0;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:1500;
}

#overlay.show{
display:block;
}

#brand h2{margin:0}
#brand p{font-size:12px;color:#94a3b8}

#newChat{
background:#22c55e;
border:none;
padding:12px;
width:100%;
color:white;
border-radius:6px;
cursor:pointer;
margin:20px 0;
}

/* CHAT LIST */

.chatItem{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
position:relative;
}

.menu{
cursor:pointer;
padding:4px 8px;
}

.menuDropdown{
display:none;
position:absolute;
right:10px;
top:32px;
background:#020617;
border:1px solid #334155;
border-radius:6px;
flex-direction:column;
z-index:1000;
}

.menuDropdown button{
background:none;
border:none;
color:white;
padding:8px 12px;
text-align:left;
cursor:pointer;
}

.menuDropdown button:hover{
background:#1e293b;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
width:100%;
}

/* TOP BAR */

#modeBar{
display:flex;
align-items:center;
gap:10px;
padding:10px 20px;
background:#020617;
flex-shrink:0;
}

#menuBtn{
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.modeBtn{
background:#1e293b;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

.modeBtn.active{
background:#22c55e;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:700px;
padding:14px;
border-radius:10px;
line-height:1.6;
white-space:pre-wrap;
}

.ai{
background:#1e293b;
align-self:flex-start;
}

.user{
background:#2563eb;
align-self:flex-end;
}

img{
max-width:260px;
border-radius:8px;
margin-top:8px;
}

/* INPUT BAR */

#inputBar{
display:flex;
gap:10px;
padding:12px;
background:#020617;
flex-shrink:0;
}

#inputContainer{
flex:1;
display:flex;
align-items:center;
background:#0f172a;
border:1px solid #1e293b;
border-radius:8px;
padding:6px;
}

#toolsBtn{
font-size:20px;
cursor:pointer;
margin-right:8px;
}

#question{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
}

#send{
background:#22c55e;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
color:white;
font-size:16px;
}

/* IDEA FORM */

#ideaForm{
padding:40px;
max-width:600px;
}

#ideaForm input{
width:100%;
margin-bottom:10px;
padding:10px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:6px;
}

#generateBtn{
background:#22c55e;
border:none;
padding:12px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">

<div id="brand">
<h2>IdeaPilot</h2>
<p>Turn ideas into execution paths</p>
</div>

<button id="newChat" onclick="startNew()">+ New Chat</button>

<h4>Your Chats</h4>

<div id="chatList"></div>

</div>

<div id="main">

<div id="modeBar">

<div id="menuBtn" onclick="openSidebar()">☰</div>

<button class="modeBtn active" onclick="setMode('idea',this)">Idea</button>
<button class="modeBtn" onclick="setMode('research',this)">Research</button>
<button class="modeBtn" onclick="setMode('build',this)">Build</button>

</div>

<div id="messages"></div>

<div id="ideaForm">

<h2>Clarify Your Idea</h2>

<input id="idea" placeholder="Your idea">
<input id="why" placeholder="Why it matters">
<input id="skills" placeholder="Your skills">
<input id="resources" placeholder="Resources">
<input id="hours" placeholder="Hours per week">
<input id="income" placeholder="Income goal">
<input id="currency" placeholder="Currency">

<button id="generateBtn" onclick="generatePlan()">Generate Plan</button>

</div>

<div id="inputBar">

<div id="inputContainer">
<div id="toolsBtn" onclick="document.getElementById('imageUpload').click()">+</div>
<input id="question" placeholder="Ask follow-up question">
</div>

<button id="send" onclick="sendMessage()">Send</button>

</div>

<input type="file" id="imageUpload" hidden accept="image/*">

</div>

<script>

let currentChatId=null
let currentMode="idea"
let pendingImage=null

const messages=document.getElementById("messages")
const chatList=document.getElementById("chatList")

function openSidebar(){
document.getElementById("sidebar").classList.add("open")
document.getElementById("overlay").classList.add("show")
}

function closeSidebar(){
document.getElementById("sidebar").classList.remove("open")
document.getElementById("overlay").classList.remove("show")
}

/* SWIPE OPEN */

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchmove",e=>{
let x=e.touches[0].clientX
if(startX<30 && x>80){
openSidebar()
}
})

function cleanAI(text){
return text.replace(/\*\*/g,"").replace(/###/g,"").replace(/##/g,"").replace(/#/g,"")
}

function setMode(mode,btn){

currentMode=mode
document.querySelectorAll(".modeBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

}

function addAI(text){

text=cleanAI(text)

const div=document.createElement("div")
div.className="message ai"
div.innerText=text

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

}

function addUser(text){

const div=document.createElement("div")
div.className="message user"
div.innerText=text

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

}

function addUserImage(src){

const div=document.createElement("div")
div.className="message user"

const img=document.createElement("img")
img.src=src

div.appendChild(img)
messages.appendChild(div)

}

document.getElementById("imageUpload").addEventListener("change",function(){

const file=this.files[0]
if(!file) return

pendingImage=file

const reader=new FileReader()

reader.onload=function(e){
addUserImage(e.target.result)
}

reader.readAsDataURL(file)

})

async function generatePlan(){

document.getElementById("ideaForm").style.display="none"

addAI("Generating startup plan...")

const res=await fetch("/plan",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

idea:idea.value,
why:why.value,
skills:skills.value,
resources:resources.value,
hours:hours.value,
incomeGoal:income.value,
currency:currency.value

})

})

const data=await res.json()

messages.innerHTML=""

currentChatId=data.chatId

addAI(data.reply)

loadChats()

}

async function sendMessage(){

const text=document.getElementById("question").value.trim()

if(!text && !pendingImage) return

if(text) addUser(text)

const formData=new FormData()

formData.append("chatId",currentChatId)
formData.append("question",text)
formData.append("mode",currentMode)

if(pendingImage){
formData.append("file",pendingImage)
}

document.getElementById("question").value=""
pendingImage=null

const res=await fetch("/followup",{method:"POST",body:formData})

const data=await res.json()

addAI(data.reply)

}

async function loadChats(){

const res=await fetch("/chats")

const chats=await res.json()

chatList.innerHTML=""

chats.reverse().forEach(chat=>{

const div=document.createElement("div")
div.className="chatItem"

const title=document.createElement("span")
title.innerText=chat.title || "Untitled Chat"

const menu=document.createElement("div")
menu.className="menu"
menu.innerText="⋯"

const dropdown=document.createElement("div")
dropdown.className="menuDropdown"

const rename=document.createElement("button")
rename.innerText="Rename"

rename.onclick=async (e)=>{

e.stopPropagation()

const newTitle=prompt("New title")
if(!newTitle) return

await fetch("/rename-chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id:chat.id,title:newTitle})
})

title.innerText=newTitle
dropdown.style.display="none"

}

const del=document.createElement("button")
del.innerText="Delete"

del.onclick=async (e)=>{

e.stopPropagation()

await fetch("/delete-chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id:chat.id})
})

dropdown.style.display="none"
loadChats()

}

dropdown.appendChild(rename)
dropdown.appendChild(del)

menu.onclick=(e)=>{

e.stopPropagation()

document.querySelectorAll(".menuDropdown").forEach(m=>{
m.style.display="none"
})

dropdown.style.display="flex"

}

div.appendChild(title)
div.appendChild(menu)
div.appendChild(dropdown)

div.onclick=()=>{

currentChatId=chat.id

messages.innerHTML=""

chat.messages.forEach(m=>{
if(m.role==="user") addUser(m.content)
else addAI(m.content)
})

closeSidebar()

}

chatList.appendChild(div)

})

}

function startNew(){

messages.innerHTML=""
document.getElementById("ideaForm").style.display="block"
closeSidebar()

}

document.addEventListener("click",()=>{
document.querySelectorAll(".menuDropdown").forEach(m=>{
m.style.display="none"
})
})

loadChats()

</script>

</body>
</html>
