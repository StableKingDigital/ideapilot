<!DOCTYPE html>
<html>
<head>

<title>IdeaPilot</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box}

html,body{
margin:0;
height:100dvh;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
}

/* APP */

#app{
display:flex;
flex-direction:column;
height:100%;
width:100%;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
overflow-y:auto;
transform:translateX(-100%);
transition:transform .25s;
z-index:2000;
}

#sidebar.open{
transform:translateX(0);
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:1500;
}

#overlay.show{
display:block;
}

#brand h2{margin:0}
#brand p{font-size:12px;color:#94a3b8}

#newChat{
background:#22c55e;
border:none;
padding:12px;
width:100%;
border-radius:6px;
color:white;
cursor:pointer;
margin:20px 0;
}

.chatItem{
background:#1e293b;
padding:10px;
border-radius:6px;
margin-bottom:8px;
cursor:pointer;
}

/* TOP BAR */

#topBar{
flex-shrink:0;
display:flex;
align-items:center;
gap:10px;
padding:12px 16px;
background:#020617;
border-bottom:1px solid #1e293b;
}

#menuBtn{
font-size:22px;
cursor:pointer;
}

/* MODE BUTTONS */

.modeBtn{
background:#1e293b;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

.modeBtn.active{
background:#22c55e;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:14px;
display:flex;
flex-direction:column;
gap:14px;
}

/* MESSAGE BUBBLES */

.message{
max-width:100%;
padding:14px;
border-radius:10px;
line-height:1.6;
white-space:pre-wrap;
}

.ai{
background:#1e293b;
align-self:flex-start;
}

.user{
background:#2563eb;
align-self:flex-end;
}

img{
max-width:220px;
border-radius:8px;
margin-top:8px;
}

/* INPUT BAR */

#inputBar{
flex-shrink:0;
display:flex;
gap:8px;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

#inputContainer{
flex:1;
display:flex;
align-items:center;
min-width:0;
background:#0f172a;
border:1px solid #1e293b;
border-radius:8px;
padding:6px;
}

#toolsBtn{
font-size:20px;
cursor:pointer;
margin-right:8px;
}

#question{
flex:1;
min-width:0;
background:transparent;
border:none;
color:white;
outline:none;
}

#send{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* IDEA FORM CARD */

.ideaCard{
background:#020617;
padding:20px;
border-radius:10px;
border:1px solid #1e293b;
}

.ideaCard input{
width:100%;
margin-bottom:10px;
padding:10px;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:6px;
}

#generateBtn{
background:#22c55e;
border:none;
padding:12px;
border-radius:6px;
color:white;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<div id="overlay"></div>

<div id="sidebar">

<div id="brand">
<h2>IdeaPilot</h2>
<p>Turn ideas into execution paths</p>
</div>

<button id="newChat" onclick="startNew()">+ New Chat</button>

<h4>Your Chats</h4>
<div id="chatList"></div>

</div>

<div id="app">

<div id="topBar">

<div id="menuBtn">☰</div>

<button class="modeBtn active" onclick="setMode('idea',this)">Idea</button>
<button class="modeBtn" onclick="setMode('research',this)">Research</button>
<button class="modeBtn" onclick="setMode('build',this)">Build</button>

</div>

<div id="messages">

<div id="ideaFormCard" class="ideaCard">

<h2>Clarify Your Idea</h2>

<input id="idea" placeholder="Your idea">
<input id="why" placeholder="Why it matters">
<input id="skills" placeholder="Your skills">
<input id="resources" placeholder="Resources">
<input id="hours" placeholder="Hours per week">
<input id="income" placeholder="Income goal">
<input id="currency" placeholder="Currency">

<button id="generateBtn" onclick="generatePlan()">Generate Plan</button>

</div>

</div>

<div id="inputBar">

<div id="inputContainer">
<div id="toolsBtn" onclick="document.getElementById('imageUpload').click()">+</div>
<input id="question" placeholder="Ask follow-up question">
</div>

<button id="send" onclick="sendMessage()">Send</button>

</div>

<input type="file" id="imageUpload" hidden accept="image/*">

</div>

<script>

/* SIDEBAR */

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")
const menuBtn=document.getElementById("menuBtn")

menuBtn.onclick=()=>{
sidebar.classList.add("open")
overlay.classList.add("show")
}

overlay.onclick=()=>{
sidebar.classList.remove("open")
overlay.classList.remove("show")
}

/* CHAT ENGINE */

let currentChatId=null
let currentMode="idea"
let pendingImage=null

const messages=document.getElementById("messages")
const chatList=document.getElementById("chatList")

function cleanAI(text){
return text.replace(/\*\*/g,"").replace(/###/g,"").replace(/##/g,"").replace(/#/g,"")
}

function setMode(mode,btn){
currentMode=mode
document.querySelectorAll(".modeBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

function addAI(text){
text=cleanAI(text)
const div=document.createElement("div")
div.className="message ai"
div.innerText=text
messages.appendChild(div)
messages.scrollTop=messages.scrollHeight
}

function addUser(text){
const div=document.createElement("div")
div.className="message user"
div.innerText=text
messages.appendChild(div)
}

/* IMAGE PREVIEW */

function addUserImage(src){
const div=document.createElement("div")
div.className="message user"
const img=document.createElement("img")
img.src=src
div.appendChild(img)
messages.appendChild(div)
}

document.getElementById("imageUpload").addEventListener("change",function(){
const file=this.files[0]
if(!file) return
pendingImage=file
const reader=new FileReader()
reader.onload=function(e){
addUserImage(e.target.result)
}
reader.readAsDataURL(file)
})

/* GENERATE PLAN */

async function generatePlan(){

const ideaVal=idea.value
const whyVal=why.value
const skillsVal=skills.value
const resourcesVal=resources.value
const hoursVal=hours.value
const incomeVal=income.value
const currencyVal=currency.value

document.getElementById("ideaFormCard").remove()

addAI("Generating startup plan...")

const res=await fetch("/plan",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
idea:ideaVal,
why:whyVal,
skills:skillsVal,
resources:resourcesVal,
hours:hoursVal,
incomeGoal:incomeVal,
currency:currencyVal
})
})

const data=await res.json()

currentChatId=data.chatId

addAI(data.reply)

loadChats()

}

/* FOLLOWUP */

async function sendMessage(){

const text=document.getElementById("question").value.trim()

if(!text && !pendingImage) return

if(text) addUser(text)

const formData=new FormData()

formData.append("chatId",currentChatId)
formData.append("question",text)
formData.append("mode",currentMode)

if(pendingImage){
formData.append("file",pendingImage)
}

document.getElementById("question").value=""
pendingImage=null

const res=await fetch("/followup",{method:"POST",body:formData})

const data=await res.json()

addAI(data.reply)

}

/* CHAT LIST */

async function loadChats(){

const res=await fetch("/chats")
const chats=await res.json()

chatList.innerHTML=""

chats.reverse().forEach(chat=>{

const div=document.createElement("div")
div.className="chatItem"
div.innerText=chat.title||"Untitled Chat"

div.onclick=()=>{
currentChatId=chat.id
messages.innerHTML=""
chat.messages.forEach(m=>{
if(m.role==="user") addUser(m.content)
else addAI(m.content)
})
sidebar.classList.remove("open")
overlay.classList.remove("show")
}

chatList.appendChild(div)

})

}

function startNew(){

messages.innerHTML=""

const form=document.createElement("div")
form.className="ideaCard"
form.id="ideaFormCard"

form.innerHTML=document.querySelector(".ideaCard").innerHTML

messages.appendChild(form)

}

loadChats()

</script>

</body>
</html>
