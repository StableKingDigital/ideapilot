<!DOCTYPE html>
<html>
<head>
<title>IdeaPilot Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:#020617;
padding:40px;
border-radius:10px;
border:1px solid #1e293b;
width:320px;
}

h2{
margin-top:0;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #334155;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
font-size:15px;
}

button:hover{
opacity:0.9;
}

p{
font-size:14px;
text-align:center;
}

a{
color:#22c55e;
text-decoration:none;
}

#error{
color:#f87171;
font-size:13px;
margin-bottom:10px;
text-align:center;
display:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Login</h2>

<div id="error"></div>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>No account? <a href="/signup.html">Create one</a></p>

</div>

<script>

/* allow ENTER key login */

document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
login()
}
})

async function login(){

const email=document.getElementById("email").value.trim()
const password=document.getElementById("password").value.trim()
const errorBox=document.getElementById("error")

errorBox.style.display="none"

if(!email || !password){
errorBox.innerText="Please enter email and password"
errorBox.style.display="block"
return
}

const res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
})

const data=await res.json()

if(data.status){

/* use backend redirect */

window.location = data.redirect || "/dashboard"

}else{

errorBox.innerText = data.error || "Login failed"
errorBox.style.display="block"

}

}

</script>

</body>
</html>
